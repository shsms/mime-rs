version: 2
# Each ecosystem opens one grouped PR per month.
updates:
  # GitHub Actions: bump the pinned SHA and its `# vX.Y.Z` comment together.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    groups:
      actions:
        patterns: ["*"]
  # Rust dependencies (regex, serde_json, tree-sitter, tulisp, …).
  - package-ecosystem: "cargo"
    directory: "/"
    schedule:
      interval: "monthly"
    groups:
      cargo:
        patterns: ["*"]
