name: Release

# When a version tag (e.g. v0.1.0) is pushed: build the Linux x86_64 binary,
# create the GitHub release for that tag, and attach the binary. Publishing to
# crates.io is done manually (`cargo publish`), not here.
#
# Actions are pinned to commit SHAs (immutable), and the release upload uses the
# official `gh` CLI rather than a third-party action.
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write # create the release and upload assets

jobs:
  release:
    name: Build and attach the Linux x86_64 binary
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      # ubuntu-latest ships rustup + a stable toolchain, so no setup action is
      # needed; this just ensures the latest stable is the default.
      - name: Set up the latest stable Rust
        run: rustup update stable && rustup default stable
      # tree-sitter-md's `parser` feature compiles C via the cc crate, so a C
      # toolchain is required. ubuntu-latest already ships build-essential, but
      # install it explicitly so the build doesn't depend on the runner image.
      - name: Install the C toolchain
        run: sudo apt-get update && sudo apt-get install -y build-essential
      - name: Build
        run: cargo build --release --locked
      - name: Package the binary
        run: tar -C target/release -czf mime-linux-x86_64.tar.gz mime
      # The official GitHub CLI (preinstalled on the runner) creates the release
      # and uploads the asset — no third-party action needed.
      - name: Create the release and upload the binary
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "${{ github.ref_name }}" mime-linux-x86_64.tar.gz --generate-notes
